name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  # true だと push 連続時に deploy ジョブが途中キャンセルされ、
  # Pages 側だけ「進行中」のまま残って後続デプロイが 400 になる
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          # リポジトリ名をサブパスとして使用 (https://<user>.github.io/<repo>/)
          BASE_PATH: /${{ github.event.repository.name }}/
      # upload-pages-artifact v2+ は chmod を行わないため、Pages 側の権限エラーを防ぐ
      - name: Fix Pages artifact permissions
        run: chmod -cR +Xr dist
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Actions タイムアウト後も Pages 側が deployment_in_progress のまま残ることがある。
      # Deployments API の latest status だけでは検出できないため、Pages API で確認・キャンセルする
      - name: 滞留した Pages デプロイをキャンセル
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo

            const ACTIVE_PAGES = new Set([
              'deployment_in_progress',
              'syncing_files',
              'finished_file_sync',
              'updating_pages',
              'purging_cdn',
            ])

            async function getPagesStatus(sha) {
              try {
                const { data } = await github.request(
                  'GET /repos/{owner}/{repo}/pages/deployments/{pages_deployment_id}',
                  { owner, repo, pages_deployment_id: sha },
                )
                return data.status ?? null
              } catch (e) {
                if (e.status === 404) return null
                throw e
              }
            }

            async function cancelPages(sha) {
              try {
                await github.request(
                  'POST /repos/{owner}/{repo}/pages/deployments/{pages_deployment_id}/cancel',
                  { owner, repo, pages_deployment_id: sha },
                )
                core.info(`Pages デプロイをキャンセル: ${sha.slice(0, 7)}`)
              } catch (e) {
                core.warning(`キャンセル失敗 ${sha.slice(0, 7)}: ${e.message}`)
              }
            }

            const { data: deployments } = await github.rest.repos.listDeployments({
              owner, repo, environment: 'github-pages', per_page: 15,
            })
            const shas = [...new Set(deployments.map((d) => d.sha))]

            for (const sha of shas) {
              const status = await getPagesStatus(sha)
              if (!status) continue
              core.info(`Pages ${sha.slice(0, 7)}: ${status}`)
              if (ACTIVE_PAGES.has(status)) await cancelPages(sha)
            }

            // キャンセル反映を待つ(最大5分)。Deployments API の in_progress だけでは不十分
            let blocked = false
            for (let i = 0; i < 60; i++) {
              blocked = false
              for (const sha of shas) {
                const status = await getPagesStatus(sha)
                if (status && ACTIVE_PAGES.has(status)) {
                  blocked = true
                  core.info(`Pages デプロイ解消待ち: ${sha.slice(0, 7)} = ${status}`)
                  break
                }
              }
              if (!blocked) {
                core.info('Pages 側の進行中デプロイはありません')
                break
              }
              await new Promise((r) => setTimeout(r, 5000))
            }
            if (blocked) core.setFailed('Pages デプロイが5分以内に解消されませんでした')
      - id: deployment
        uses: actions/deploy-pages@v4
        # timeout は最大 600000ms(10分) が上限。超える値は無視される

  # デプロイ直後の公開環境に対して基本フローのスモークE2Eを実行する
  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test e2e/basic.spec.ts
        env:
          E2E_BASE_URL: ${{ needs.deploy.outputs.page_url }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-report
          path: playwright-report
          retention-days: 7
