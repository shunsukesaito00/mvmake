name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # true だと push 連続時に deploy ジョブが途中キャンセルされ、
  # Pages 側だけ「進行中」のまま残って後続デプロイが 400 になる
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          # リポジトリ名をサブパスとして使用 (https://<user>.github.io/<repo>/)
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Actions 側がタイムアウトしても Pages 側にデプロイが「進行中」のまま残ることがあり、
      # その場合は後続のデプロイが 400 で拒否され続ける。先に滞留分をキャンセルする
      - name: 滞留した Pages デプロイをキャンセル
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo

            async function latestStatus(deploymentId) {
              const { data } = await github.rest.repos.listDeploymentStatuses({
                owner, repo, deployment_id: deploymentId, per_page: 1,
              })
              return data[0]?.state
            }

            const { data: deployments } = await github.rest.repos.listDeployments({
              owner, repo, environment: 'github-pages', per_page: 20,
            })

            for (const d of deployments) {
              const state = await latestStatus(d.id)
              if (!state || !['in_progress', 'queued', 'pending', 'waiting'].includes(state)) continue
              try {
                await github.request('POST /repos/{owner}/{repo}/pages/deployments/{pages_deployment_id}/cancel', {
                  owner, repo, pages_deployment_id: d.sha,
                })
                core.info(`進行中の Pages デプロイをキャンセル: ${d.sha.slice(0, 7)} (${state})`)
              } catch (e) {
                core.warning(`キャンセル失敗 ${d.sha.slice(0, 7)}: ${e.message}`)
              }
            }

            // キャンセル反映を待つ(最大2分)。未解消のまま deploy すると 400 になる
            for (let i = 0; i < 24; i++) {
              const { data: recent } = await github.rest.repos.listDeployments({
                owner, repo, environment: 'github-pages', per_page: 5,
              })
              let blocked = false
              for (const d of recent) {
                const state = await latestStatus(d.id)
                if (state === 'in_progress') { blocked = true; break }
              }
              if (!blocked) break
              core.info('Pages デプロイの解消を待機中...')
              await new Promise((r) => setTimeout(r, 5000))
            }
      - id: deployment
        uses: actions/deploy-pages@v4
        # timeout は最大 600000ms(10分) が上限。超える値は無視される

  # デプロイ直後の公開環境に対して基本フローのスモークE2Eを実行する
  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test e2e/basic.spec.ts
        env:
          E2E_BASE_URL: ${{ needs.deploy.outputs.page_url }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-report
          path: playwright-report
          retention-days: 7
