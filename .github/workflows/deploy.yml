name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          # リポジトリ名をサブパスとして使用 (https://<user>.github.io/<repo>/)
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Actions 側がタイムアウトしても Pages 側にデプロイが「進行中」のまま残ることがあり、
      # その場合は後続のデプロイが 400 で拒否され続ける。先に滞留分をキャンセルする
      - name: 滞留した Pages デプロイをキャンセル
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner, repo, environment: 'github-pages', per_page: 10,
            })
            for (const d of deployments) {
              try {
                // pages_deployment_id にはコミット SHA も指定できる。進行中でなければ 404/422 になるので無視
                await github.request('POST /repos/{owner}/{repo}/pages/deployments/{pages_deployment_id}/cancel', {
                  owner, repo, pages_deployment_id: d.sha,
                })
                core.info(`進行中の Pages デプロイをキャンセルしました: ${d.sha}`)
              } catch (e) {
                core.debug(`skip ${d.sha}: ${e.status}`)
              }
            }
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Pages バックエンドが混雑するとデフォルト10分では完了しないことがある
          timeout: 1200000

  # デプロイ直後の公開環境に対して基本フローのスモークE2Eを実行する
  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test e2e/basic.spec.ts
        env:
          E2E_BASE_URL: ${{ needs.deploy.outputs.page_url }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-report
          path: playwright-report
          retention-days: 7
