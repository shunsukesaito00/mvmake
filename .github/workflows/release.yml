name: Create GitHub Release

# v* タグの push で docs/RELEASE_NOTES.md を本文にした Release を作成する
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file docs/RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ github.token }}
